<!DOCTYPE html>
<html lang="{{ DEFAULT_LANG }}">
<head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="{{ SITEURL }}/theme/images/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css" type="text/css" />
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    {% block head %}{% endblock %}
</head>

<body>
    <header class="site-header">
        <div class="container header-container">
            <a href="{{ SITEURL }}/" class="site-logo"><img src="{{ SITEURL }}/theme/images/favicon.svg"/></a>
            
            
            <nav class="site-nav">
                <a href="{{ SITEURL }}/index.html" class="nav-link">Blog</a>
                
                {% for p in pages %}
                    {% if p.status != 'draft' %}
                    <a href="{{ SITEURL }}/{{ p.url }}" class="nav-link {% if p == page %}active{% endif %}">{{ p.title }}</a>
                    {% endif %}
                {% endfor %}

                <button id="theme-toggle" aria-label="Toggle dark mode" class="theme-btn">
                    <svg class="sun-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.22" x2="5.64" y2="17.78"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </nav>
        </div>
    </header>

    <main class="container content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-container">
            <p>&copy; {{ CURRENT_YEAR }} {{ AUTHOR }}. Powered by <a href="https://getpelican.com/">Pelican</a></p>
        </div>
    </footer>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        toggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
